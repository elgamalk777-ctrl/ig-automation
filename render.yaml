services:
  - type: web
    name: ig-comment-dm-automation
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./app.db
